[platformio]
default_envs = esp32s3
src_dir = .
include_dir = .

[env]
build_flags =
  -std=gnu++17

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
  ${env.build_flags}
  -I.
  -Itest/mocks

[env:esp32s3]
platform = espressif32@6.8.1
board = esp32-s3-devkitc-1
framework = arduino
upload_port = /dev/cu.usbmodem2101
upload_speed = 115200
monitor_port = /dev/cu.usbmodem2101
monitor_speed = 115200
monitor_filters =
  time
lib_ldf_mode = deep+
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
  -DCONFIG_NIMBLE_MAX_CONNECTIONS=2
  -DCONFIG_BT_NIMBLE_MAX_CCCDS=12
  -DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=24
  -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=6144
build_src_filter =
  +<*.cpp>
lib_deps =
  h2zero/NimBLE-Arduino@2.3.7
  moononournation/GFX Library for Arduino@1.5.9
  waspinator/AccelStepper@1.64
  mikalhart/TinyGPSPlus@1.1.0

[env:esp32s3_bno08x_sh2_uart]
extends = env:esp32s3
build_flags =
  ${env:esp32s3.build_flags}
  -DBOATLOCK_COMPASS_SH2_UART=1
lib_deps =
  ${env:esp32s3.lib_deps}
  adafruit/Adafruit BNO08x@1.2.5

[env:esp32s3_debug_wifi_ota]
extends = env:esp32s3
extra_scripts =
  pre:../tools/pio/boatlock_debug_wifi_flags.py

[env:gpio_probe]
extends = env:esp32s3
build_src_filter =
  -<*>
  +<debug/gpio_probe.cpp>

[env:uart_rvc_probe_rx12]
extends = env:esp32s3
build_flags =
  ${env:esp32s3.build_flags}
  -DBOATLOCK_RVC_RX_PIN=12
  -DBOATLOCK_COMPASS_RESET_PIN=13
build_src_filter =
  -<*>
  +<debug/uart_rvc_probe.cpp>

[env:jc4832w535]
extends = env:esp32s3
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
upload_speed = 460800
build_flags =
  ${env:esp32s3.build_flags}
  -DBOARD_HAS_PSRAM
  -DBOATLOCK_BOARD_JC4832W535
