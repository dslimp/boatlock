[platformio]
default_envs = esp32s3
src_dir = .
include_dir = .

[env]
build_flags =
  -std=gnu++17

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
  ${env.build_flags}
  -I.
  -Itest/mocks

[env:esp32s3]
platform = espressif32@6.8.1
board = esp32-s3-devkitc-1
framework = arduino
upload_port = /dev/cu.usbmodem2101
upload_speed = 115200
monitor_port = /dev/cu.usbmodem2101
monitor_speed = 115200
monitor_filters =
  time
lib_ldf_mode = deep+
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
  +<*.cpp>
lib_deps =
  h2zero/NimBLE-Arduino@2.3.7
  moononournation/GFX Library for Arduino@1.5.9
  waspinator/AccelStepper@1.64
  mikalhart/TinyGPSPlus@1.1.0
  adafruit/Adafruit Unified Sensor@1.1.15
  adafruit/Adafruit BNO08x@1.2.5

[env:jc4832w535]
extends = env:esp32s3
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
upload_speed = 460800
build_flags =
  ${env:esp32s3.build_flags}
  -DBOARD_HAS_PSRAM
  -DBOATLOCK_BOARD_JC4832W535
