name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  firmware-checks:
    name: firmware-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Install Python tools
        run: python3 -m pip install pytest

      - name: Run CI helper tests
        run: python3 -m pytest tools/ci/test_*.py

      - name: Check config schema version
        run: python3 tools/ci/check_config_schema_version.py

      - name: Check firmware semver
        run: python3 tools/ci/check_firmware_version.py

      - name: Firmware warnings as errors (critical modules)
        run: bash tools/ci/check_firmware_werror.sh

      - name: Firmware static analysis (cppcheck)
        run: bash tools/ci/check_firmware_cppcheck.sh

  firmware-test:
    name: firmware-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python3 -m pip install platformio

      - name: Run firmware unit tests
        working-directory: boatlock
        run: pio test -e native

  firmware-sim:
    name: firmware-sim
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run anchor simulation tests
        run: |
          python3 tools/sim/test_sim_core.py
          python3 tools/sim/run_sim.py --check --json-out tools/sim/report.json
          python3 tools/sim/test_soak.py
          python3 tools/sim/run_soak.py --hours 6 --check --json-out tools/sim/soak_report.json

      - name: Upload simulation reports
        uses: actions/upload-artifact@v4
        with:
          name: simulation-reports
          if-no-files-found: error
          path: |
            tools/sim/report.json
            tools/sim/soak_report.json

  firmware-build:
    name: firmware-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python3 -m pip install platformio

      - name: Build firmware (esp32s3)
        working-directory: boatlock
        run: pio run -e esp32s3

      - name: Build service firmware (esp32s3_service)
        working-directory: boatlock
        run: pio run -e esp32s3_service

      - name: Pack firmware binary artifact
        run: |
          set -euo pipefail
          artifact_dir="dist/firmware-esp32s3"
          build_dir="boatlock/.pio/build/esp32s3"
          mkdir -p "${artifact_dir}"
          cp "${build_dir}/firmware.bin" "${artifact_dir}/firmware.bin"
          cp "${build_dir}/bootloader.bin" "${artifact_dir}/bootloader.bin"
          cp "${build_dir}/partitions.bin" "${artifact_dir}/partitions.bin"
          cp "${build_dir}/firmware.elf" "${artifact_dir}/firmware.elf"

          firmware_version="$(python3 tools/ci/check_firmware_version.py --print-only)"
          firmware_sha256="$(sha256sum "${artifact_dir}/firmware.bin" | awk '{print $1}')"
          {
            echo "firmware_version=${firmware_version}"
            echo "firmware_sha256=${firmware_sha256}"
            echo "artifact_name=firmware-esp32s3"
            echo "platformio_env=esp32s3"
            echo "github_ref=${GITHUB_REF}"
            echo "github_sha=${GITHUB_SHA}"
          } > "${artifact_dir}/BUILD_INFO.txt"

          (cd "${artifact_dir}" && sha256sum firmware.bin bootloader.bin partitions.bin firmware.elf > SHA256SUMS)

      - name: Pack service firmware binary artifact
        run: |
          set -euo pipefail
          artifact_dir="dist/firmware-esp32s3-service"
          build_dir="boatlock/.pio/build/esp32s3_service"
          mkdir -p "${artifact_dir}"
          cp "${build_dir}/firmware.bin" "${artifact_dir}/firmware.bin"
          cp "${build_dir}/bootloader.bin" "${artifact_dir}/bootloader.bin"
          cp "${build_dir}/partitions.bin" "${artifact_dir}/partitions.bin"
          cp "${build_dir}/firmware.elf" "${artifact_dir}/firmware.elf"

          firmware_version="$(python3 tools/ci/check_firmware_version.py --print-only)"
          firmware_sha256="$(sha256sum "${artifact_dir}/firmware.bin" | awk '{print $1}')"
          {
            echo "firmware_version=${firmware_version}"
            echo "firmware_sha256=${firmware_sha256}"
            echo "artifact_name=firmware-esp32s3-service"
            echo "platformio_env=esp32s3_service"
            echo "command_profile=service"
            echo "github_ref=${GITHUB_REF}"
            echo "github_sha=${GITHUB_SHA}"
            echo "github_run_id=${GITHUB_RUN_ID}"
          } > "${artifact_dir}/BUILD_INFO.txt"

          (cd "${artifact_dir}" && sha256sum firmware.bin bootloader.bin partitions.bin firmware.elf > SHA256SUMS)

      - name: Upload firmware binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32s3
          if-no-files-found: error
          path: dist/firmware-esp32s3/*

      - name: Upload service firmware binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32s3-service
          if-no-files-found: error
          path: dist/firmware-esp32s3-service/*

  firmware-main-channel:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: firmware-main-channel
    needs:
      - firmware-checks
      - firmware-test
      - firmware-sim
      - firmware-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python3 -m pip install platformio

      - name: Build OTA-capable main firmware
        working-directory: boatlock
        run: pio run -e esp32s3_service

      - name: Pack latest-main firmware channel
        run: |
          set -euo pipefail
          site_dir="dist/pages"
          channel_dir="${site_dir}/firmware/main"
          build_dir="boatlock/.pio/build/esp32s3_service"
          base_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/firmware/main"
          firmware_version="$(python3 tools/ci/check_firmware_version.py --print-only)"

          mkdir -p "${channel_dir}"
          cp "${build_dir}/firmware.bin" "${channel_dir}/firmware.bin"
          cp "${build_dir}/firmware.elf" "${channel_dir}/firmware.elf"

          python3 tools/ci/generate_firmware_update_manifest.py \
            --firmware "${channel_dir}/firmware.bin" \
            --out "${channel_dir}/manifest.json" \
            --base-url "${base_url}" \
            --git-sha "${GITHUB_SHA}" \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --firmware-version "${firmware_version}"

          firmware_sha256="$(sha256sum "${channel_dir}/firmware.bin" | awk '{print $1}')"
          {
            echo "firmware_version=${firmware_version}"
            echo "firmware_sha256=${firmware_sha256}"
            echo "artifact_name=firmware-esp32s3-service"
            echo "platformio_env=esp32s3_service"
            echo "command_profile=service"
            echo "github_ref=${GITHUB_REF}"
            echo "github_sha=${GITHUB_SHA}"
            echo "manifest_url=${base_url}/manifest.json"
          } > "${channel_dir}/BUILD_INFO.txt"

          (cd "${channel_dir}" && sha256sum firmware.bin firmware.elf manifest.json BUILD_INFO.txt > SHA256SUMS)

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload latest-main Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/pages

      - name: Deploy latest-main firmware channel
        id: deployment
        uses: actions/deploy-pages@v4

  flutter-checks:
    name: flutter-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get

      - name: Check formatting
        working-directory: boatlock_ui
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        working-directory: boatlock_ui
        run: flutter analyze

      - name: Test
        working-directory: boatlock_ui
        run: flutter test

      - name: Test service UI
        working-directory: boatlock_ui
        run: flutter test --dart-define=BOATLOCK_SERVICE_UI=true test/settings_page_service_ui_test.dart

  flutter-build-android:
    name: flutter-build-android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Android SDK packages
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/28.2.13676358
            /usr/local/lib/android/sdk/platforms/android-36
            /usr/local/lib/android/sdk/build-tools/35.0.0
            /usr/local/lib/android/sdk/build-tools/36.0.0
            /usr/local/lib/android/sdk/cmake/4.1.2
          key: android-sdk-${{ runner.os }}-ndk-28.2.13676358-platform-36-build-tools-35.0.0-36.0.0-cmake-4.1.2

      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get

      - name: Build Android APK (release)
        working-directory: boatlock_ui
        env:
          GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
        run: flutter build apk --release

      - name: Pack Android APK
        run: |
          set -euo pipefail
          mkdir -p dist/flutter-android-apk
          cp boatlock_ui/build/app/outputs/flutter-apk/app-release.apk dist/flutter-android-apk/boatlock-app.apk

      - name: Build Android service APK (latest main)
        working-directory: boatlock_ui
        env:
          GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
        run: |
          flutter build apk --release \
            --dart-define=BOATLOCK_SERVICE_UI=true \
            --dart-define=BOATLOCK_FIRMWARE_UPDATE_MANIFEST_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/firmware/main/manifest.json

      - name: Pack Android service APK
        run: |
          set -euo pipefail
          mkdir -p dist/flutter-android-service-apk
          cp boatlock_ui/build/app/outputs/flutter-apk/app-release.apk dist/flutter-android-service-apk/boatlock-service-main.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-apk
          if-no-files-found: error
          path: dist/flutter-android-apk/boatlock-app.apk

      - name: Upload Android service APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-service-apk
          if-no-files-found: error
          path: dist/flutter-android-service-apk/boatlock-service-main.apk

  flutter-build-web:
    name: flutter-build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get

      - name: Build web
        working-directory: boatlock_ui
        run: flutter build web --release

      - name: Pack web artifact
        working-directory: boatlock_ui
        run: |
          cd build/web
          zip -r ../../web-build.zip .

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          if-no-files-found: error
          path: boatlock_ui/web-build.zip

  flutter-build-macos:
    name: flutter-build-macos
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get

      - name: Build macOS app
        working-directory: boatlock_ui
        run: flutter build macos --release

      - name: Pack macOS app
        working-directory: boatlock_ui
        run: |
          set -euo pipefail
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent boatlock_ui.app ../../../../../boatlock-macos.zip

      - name: Build macOS service app (latest main)
        working-directory: boatlock_ui
        run: |
          flutter build macos --release \
            --dart-define=BOATLOCK_SERVICE_UI=true \
            --dart-define=BOATLOCK_FIRMWARE_UPDATE_MANIFEST_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/firmware/main/manifest.json

      - name: Pack macOS service app
        working-directory: boatlock_ui
        run: |
          set -euo pipefail
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent boatlock_ui.app ../../../../../boatlock-macos-service-main.zip

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: flutter-macos-app
          if-no-files-found: error
          path: boatlock_ui/boatlock-macos.zip

      - name: Upload macOS service app
        uses: actions/upload-artifact@v4
        with:
          name: flutter-macos-service-app
          if-no-files-found: error
          path: boatlock_ui/boatlock-macos-service-main.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - firmware-checks
      - firmware-test
      - firmware-sim
      - firmware-build
      - flutter-checks
      - flutter-build-android
      - flutter-build-web
      - flutter-build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag against firmware version
        run: python3 tools/ci/check_firmware_version.py --tag "${{ github.ref_name }}"

      - name: Generate release notes from changelog
        run: |
          python3 tools/ci/test_generate_release_notes.py
          python3 tools/ci/generate_release_notes.py --tag "${{ github.ref_name }}" --out release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Add release firmware update manifest
        run: |
          python3 tools/ci/generate_firmware_update_manifest.py \
            --firmware artifacts/firmware-esp32s3-service/firmware.bin \
            --out artifacts/firmware-esp32s3-service/manifest.json \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}" \
            --git-sha "${GITHUB_SHA}" \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --firmware-version "$(python3 tools/ci/check_firmware_version.py --print-only)"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/firmware-esp32s3/*
            artifacts/firmware-esp32s3-service/*
            artifacts/simulation-reports/*
            artifacts/flutter-android-apk/*
            artifacts/flutter-android-service-apk/*
            artifacts/flutter-web/*
            artifacts/flutter-macos-app/*
            artifacts/flutter-macos-service-app/*
