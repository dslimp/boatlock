name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Install PlatformIO
        run: pip install platformio

      - name: Check config schema version
        run: |
          python3 tools/ci/test_check_config_schema_version.py
          python3 tools/ci/check_config_schema_version.py

      - name: Check firmware semver
        run: |
          python3 tools/ci/test_check_firmware_version.py
          python3 tools/ci/check_firmware_version.py

      - name: Firmware warnings as errors (critical modules)
        run: bash tools/ci/check_firmware_werror.sh

      - name: Firmware static analysis (cppcheck)
        run: bash tools/ci/check_firmware_cppcheck.sh

      - name: Run firmware unit tests
        working-directory: boatlock
        run: pio test -e native

      - name: Run anchor simulation tests
        run: |
          python3 tools/sim/test_sim_core.py
          python3 tools/sim/run_sim.py --check --json-out tools/sim/report.json
          python3 tools/sim/test_soak.py
          python3 tools/sim/run_soak.py --hours 6 --check --json-out tools/sim/soak_report.json

      - name: Build firmware (esp32s3)
        working-directory: boatlock
        run: pio run -e esp32s3

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32s3
          if-no-files-found: error
          path: |
            boatlock/.pio/build/esp32s3/firmware.bin
            boatlock/.pio/build/esp32s3/bootloader.bin
            boatlock/.pio/build/esp32s3/partitions.bin
            boatlock/.pio/build/esp32s3/firmware.elf
            tools/sim/report.json
            tools/sim/soak_report.json

  flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.4"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get

      - name: Check formatting
        working-directory: boatlock_ui
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        working-directory: boatlock_ui
        run: flutter analyze

      - name: Test
        working-directory: boatlock_ui
        run: flutter test

      - name: Build Android APK (release)
        working-directory: boatlock_ui
        run: flutter build apk --release

      - name: Build web
        working-directory: boatlock_ui
        run: flutter build web --release

      - name: Pack web artifact
        working-directory: boatlock_ui
        run: |
          cd build/web
          zip -r ../../web-build.zip .

      - name: Upload Flutter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-web
          if-no-files-found: error
          path: |
            boatlock_ui/build/app/outputs/flutter-apk/app-release.apk
            boatlock_ui/web-build.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - firmware
      - flutter
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag against firmware version
        run: python3 tools/ci/check_firmware_version.py --tag "${{ github.ref_name }}"

      - name: Generate release notes from changelog
        run: |
          python3 tools/ci/test_generate_release_notes.py
          python3 tools/ci/generate_release_notes.py --tag "${{ github.ref_name }}" --out release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/firmware-esp32s3/*
            artifacts/flutter-android-web/*
