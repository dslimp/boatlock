name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  platformio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build firmware
        working-directory: boatlock
        run: platformio run

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: 'stable'
      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get
      - name: Build web
        working-directory: boatlock_ui
        run: flutter build web
