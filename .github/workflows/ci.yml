---
name: CI

'on':
  push:
    branches: [main]
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check test format
        working-directory: boatlock
        run: |
          clang-format --version
          find test -name '*.cpp' | xargs -r clang-format --dry-run --Werror
      - name: Run unit tests
        working-directory: boatlock
        run: platformio test -e native
      - uses: arduino/setup-arduino-cli@v2
      - name: Install Arduino core and libraries
        run: |
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli lib install "Arduino_GFX" "NimBLE-Arduino" "AccelStepper" "TinyGPSPlus" "Adafruit Unified Sensor" "Adafruit HMC5883 Unified"
      - name: Build firmware
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32s3 boatlock

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: 'stable'
      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get
      - name: Format
        working-directory: boatlock_ui
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        working-directory: boatlock_ui
        run: flutter analyze
      - name: Build web
        working-directory: boatlock_ui
        run: flutter build web
      - name: Test
        working-directory: boatlock_ui
        run: flutter test
