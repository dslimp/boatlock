name: CI

on:
  push:
    branches:
      - main
      - "release/**"
    tags:
      - "v*"
  pull_request:

jobs:
  firmware-checks:
    name: firmware-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Install Python tools
        run: python3 -m pip install pytest

      - name: Run CI helper tests
        run: python3 -m pytest tools/ci/test_*.py

      - name: Check config schema version
        run: python3 tools/ci/check_config_schema_version.py

      - name: Check firmware semver
        run: python3 tools/ci/check_firmware_version.py

      - name: Firmware warnings as errors (critical modules)
        run: bash tools/ci/check_firmware_werror.sh

      - name: Firmware static analysis (cppcheck)
        run: bash tools/ci/check_firmware_cppcheck.sh

  firmware-test:
    name: firmware-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python3 -m pip install platformio

      - name: Run firmware unit tests
        working-directory: boatlock
        run: pio test -e native

  firmware-sim:
    name: firmware-sim
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run anchor simulation tests
        run: |
          python3 tools/sim/test_sim_core.py
          python3 tools/sim/run_sim.py --check --json-out tools/sim/report.json
          python3 tools/sim/test_soak.py
          python3 tools/sim/run_soak.py --hours 6 --check --json-out tools/sim/soak_report.json

      - name: Upload simulation reports
        uses: actions/upload-artifact@v4
        with:
          name: simulation-reports
          if-no-files-found: error
          path: |
            tools/sim/report.json
            tools/sim/soak_report.json

  firmware-build:
    name: firmware-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python3 -m pip install platformio

      - name: Build firmware (esp32s3)
        working-directory: boatlock
        run: pio run -e esp32s3

      - name: Pack firmware binary artifact
        run: |
          set -euo pipefail
          artifact_dir="dist/firmware-esp32s3"
          build_dir="boatlock/.pio/build/esp32s3"
          mkdir -p "${artifact_dir}"
          cp "${build_dir}/firmware.bin" "${artifact_dir}/firmware.bin"
          cp "${build_dir}/bootloader.bin" "${artifact_dir}/bootloader.bin"
          cp "${build_dir}/partitions.bin" "${artifact_dir}/partitions.bin"
          cp "${build_dir}/firmware.elf" "${artifact_dir}/firmware.elf"

          firmware_version="$(python3 tools/ci/check_firmware_version.py --print-only)"
          firmware_sha256="$(sha256sum "${artifact_dir}/firmware.bin" | awk '{print $1}')"
          {
            echo "firmware_version=${firmware_version}"
            echo "firmware_sha256=${firmware_sha256}"
            echo "artifact_name=firmware-esp32s3"
            echo "platformio_env=esp32s3"
            echo "command_profile=release"
            echo "github_ref=${GITHUB_REF}"
            echo "github_sha=${GITHUB_SHA}"
            echo "github_run_id=${GITHUB_RUN_ID}"
          } > "${artifact_dir}/BUILD_INFO.txt"

          (cd "${artifact_dir}" && sha256sum firmware.bin bootloader.bin partitions.bin firmware.elf > SHA256SUMS)

      - name: Upload firmware binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32s3
          if-no-files-found: error
          path: dist/firmware-esp32s3/*

  flutter-checks:
    name: flutter-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get

      - name: Check formatting
        working-directory: boatlock_ui
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        working-directory: boatlock_ui
        run: flutter analyze

      - name: Test
        working-directory: boatlock_ui
        run: flutter test

      - name: Test setup UI
        working-directory: boatlock_ui
        run: flutter test test/settings_page_setup_ui_test.dart

  flutter-build-android:
    name: flutter-build-android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Android SDK packages
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/28.2.13676358
            /usr/local/lib/android/sdk/platforms/android-36
            /usr/local/lib/android/sdk/build-tools/35.0.0
            /usr/local/lib/android/sdk/build-tools/36.0.0
            /usr/local/lib/android/sdk/cmake/4.1.2
          key: android-sdk-${{ runner.os }}-ndk-28.2.13676358-platform-36-build-tools-35.0.0-36.0.0-cmake-4.1.2

      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get

      - name: Prepare Android release signing
        env:
          BOATLOCK_ANDROID_KEYSTORE_BASE64: ${{ secrets.BOATLOCK_ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${BOATLOCK_ANDROID_KEYSTORE_BASE64}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              echo "BOATLOCK_ANDROID_KEYSTORE_BASE64 is required for tagged Android releases" >&2
              exit 1
            fi
            echo "Android release signing secrets are not configured; using debug signing for this non-release build"
            exit 0
          fi

          signing_dir="${RUNNER_TEMP}/boatlock-android-signing"
          keystore_path="${signing_dir}/boatlock-release.jks"
          mkdir -p "${signing_dir}"
          printf '%s' "${BOATLOCK_ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
          chmod 600 "${keystore_path}"
          echo "BOATLOCK_ANDROID_KEYSTORE_PATH=${keystore_path}" >> "${GITHUB_ENV}"

      - name: Build Android APK (release)
        working-directory: boatlock_ui
        env:
          BOATLOCK_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.BOATLOCK_ANDROID_KEYSTORE_PASSWORD }}
          BOATLOCK_ANDROID_KEY_ALIAS: ${{ secrets.BOATLOCK_ANDROID_KEY_ALIAS }}
          BOATLOCK_ANDROID_KEY_PASSWORD: ${{ secrets.BOATLOCK_ANDROID_KEY_PASSWORD }}
          BOATLOCK_ANDROID_REQUIRE_RELEASE_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}
          GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
        run: flutter build apk --release

      - name: Pack Android APK
        run: |
          set -euo pipefail
          mkdir -p dist/flutter-android-apk
          cp boatlock_ui/build/app/outputs/flutter-apk/app-release.apk dist/flutter-android-apk/boatlock-app.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-apk
          if-no-files-found: error
          path: dist/flutter-android-apk/boatlock-app.apk

  flutter-build-web:
    name: flutter-build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get

      - name: Build web
        working-directory: boatlock_ui
        run: flutter build web --release

      - name: Pack web artifact
        working-directory: boatlock_ui
        run: |
          cd build/web
          zip -r ../../web-build.zip .

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          if-no-files-found: error
          path: boatlock_ui/web-build.zip

  flutter-build-macos:
    name: flutter-build-macos
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: boatlock_ui
        run: flutter pub get

      - name: Build macOS app
        working-directory: boatlock_ui
        run: flutter build macos --release

      - name: Pack macOS app
        working-directory: boatlock_ui
        run: |
          set -euo pipefail
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent BoatLock.app ../../../../../boatlock-macos.zip

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: flutter-macos-app
          if-no-files-found: error
          path: boatlock_ui/boatlock-macos.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - firmware-checks
      - firmware-test
      - firmware-sim
      - firmware-build
      - flutter-checks
      - flutter-build-android
      - flutter-build-web
      - flutter-build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag against firmware version
        run: python3 tools/ci/check_firmware_version.py --tag "${{ github.ref_name }}"

      - name: Validate release branch containment
        run: python3 tools/ci/check_release_ref.py --tag "${{ github.ref_name }}" --require-current-commit

      - name: Generate release notes from changelog
        run: |
          python3 tools/ci/test_generate_release_notes.py
          python3 tools/ci/generate_release_notes.py --tag "${{ github.ref_name }}" --out release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare GitHub Release assets
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          release_branch="$(python3 tools/ci/check_release_ref.py --tag "${tag}" --print-branch)"
          release_dir="release-assets"
          firmware_version="$(python3 tools/ci/check_firmware_version.py --print-only)"
          mkdir -p "${release_dir}"

          cp artifacts/firmware-esp32s3/firmware.bin "${release_dir}/firmware-esp32s3.bin"
          cp artifacts/firmware-esp32s3/bootloader.bin "${release_dir}/bootloader-esp32s3.bin"
          cp artifacts/firmware-esp32s3/partitions.bin "${release_dir}/partitions-esp32s3.bin"
          cp artifacts/firmware-esp32s3/firmware.elf "${release_dir}/firmware-esp32s3.elf"

          release_sha256="$(sha256sum "${release_dir}/firmware-esp32s3.bin" | awk '{print $1}')"
          {
            echo "firmware_version=${firmware_version}"
            echo "firmware_sha256=${release_sha256}"
            echo "artifact_name=firmware-esp32s3"
            echo "platformio_env=esp32s3"
            echo "command_profile=release"
            echo "release_branch=${release_branch}"
            echo "github_ref=${GITHUB_REF}"
            echo "github_sha=${GITHUB_SHA}"
            echo "github_run_id=${GITHUB_RUN_ID}"
          } > "${release_dir}/BUILD_INFO-esp32s3.txt"

          (
            cd "${release_dir}"
            sha256sum firmware-esp32s3.bin bootloader-esp32s3.bin partitions-esp32s3.bin firmware-esp32s3.elf BUILD_INFO-esp32s3.txt > SHA256SUMS-esp32s3.txt
          )

          python3 tools/ci/generate_firmware_update_manifest.py \
            --firmware "${release_dir}/firmware-esp32s3.bin" \
            --out "${release_dir}/manifest.json" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}" \
            --binary-filename "firmware-esp32s3.bin" \
            --channel release \
            --branch "${release_branch}" \
            --git-sha "${GITHUB_SHA}" \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --firmware-version "${firmware_version}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            release-assets/*
            artifacts/simulation-reports/*
            artifacts/flutter-android-apk/*
            artifacts/flutter-web/*
            artifacts/flutter-macos-app/*
