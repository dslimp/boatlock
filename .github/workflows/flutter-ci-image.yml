name: Flutter CI Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - ".github/images/flutter-android-ci/**"
      - ".github/workflows/flutter-ci-image.yml"
      - "boatlock_ui/pubspec.yaml"
      - "boatlock_ui/pubspec.lock"
      - "boatlock_ui/android/**"
      - "boatlock_ui/lib/**"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/flutter-android-ci
  IMAGE_TAG: 3.32.4-android33-ndk27.0

jobs:
  build:
    name: build-flutter-ci-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Flutter CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/images/flutter-android-ci/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=BoatLock Flutter Android CI image
          cache-from: type=gha,scope=flutter-android-ci
          cache-to: type=gha,mode=max,scope=flutter-android-ci
