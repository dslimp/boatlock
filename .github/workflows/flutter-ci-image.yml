name: Flutter CI Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - ".github/images/flutter-android-ci/**"
      - ".github/workflows/flutter-ci-image.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/flutter-android-ci
  IMAGE_TAG: 3.41.7-android36-ndk28.2

jobs:
  build:
    name: build-flutter-ci-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Flutter CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/images/flutter-android-ci/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=BoatLock Flutter Android CI image
